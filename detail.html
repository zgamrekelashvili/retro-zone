<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroZone — Detail View</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-retro">RETRO</span><span class="logo-zone">ZONE</span>
        <span class="logo-sub">Classic Cars &amp; Parts</span>
      </a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Catalog</a>
        <a href="post.html" class="nav-link">Post an Ad</a>
        <a href="profile.html" class="nav-link">My Profile</a>
        <a href="cart.html" class="nav-link cart-link">
          🛒 Cart <span class="cart-badge" id="cart-badge">0</span>
        </a>
      </nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
    </div>
  </header>

  <main>
    <div class="detail-breadcrumb">
      <a href="index.html">← Back to Catalog</a>
    </div>

    <div id="loading" class="loading-spinner" aria-live="polite">
      <div class="spinner"></div>
      <p>Loading listing…</p>
    </div>
    <div id="error-notice" class="error-notice hidden" aria-live="assertive"></div>
    <div id="detail-root"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand"><span class="logo-retro">RETRO</span><span class="logo-zone">ZONE</span></p>
      <p class="footer-copy">&copy; 2026 RetroZone Marketplace. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="post.html">Post an Ad</a>
        <a href="profile.html">Profile</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
